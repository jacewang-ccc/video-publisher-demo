<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>video-publisher-demo</title>
    <script>
      // Keep GitHub Pages paths stable and redirect to the real web panel entry.
      // - `/repo` (no trailing slash) breaks relative asset URLs.
      // - The actual demo UI lives under `apps/web/`.
      (function () {
        try {
          var p = location.pathname || "/";
          if (!p.endsWith("/") && !p.endsWith(".html")) {
            location.replace(p + "/" + location.search + location.hash);
            return;
          }
          if (!p.endsWith("/apps/web/") && !p.endsWith("/apps/web/index.html")) {
            location.replace(p + "apps/web/" + location.search + location.hash);
          }
        } catch (_) {}
      })();
    </script>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; padding: 24px; }
      a { color: #2563eb; }
    </style>
  </head>
  <body>
    <div>Redirecting to the web panel… If it doesn't redirect, open <a href="apps/web/">apps/web/</a>.</div>
  </body>
</html>
